benchmark:
  name: 64x64 weight-stationary batched photonic matmul
  description: Synthetic component-model example that exercises operand reuse, weight-stationary execution, pipelining, and separate vector/weight DAC assumptions. This is not a published accelerator calibration card.
workload:
  type: matmul
  m: 64
  n: 64
  k: 64
device:
  optical_mac_energy_fj: 0.5
  laser_wall_plug_efficiency: 0.25
  photodetector_energy_fj_per_sample: 10
  adc:
    bits: 6
    energy_pj_per_conversion: 0.5
  vector_dac:
    bits: 6
    energy_pj_per_conversion: 0.12
  weight_dac:
    bits: 8
    energy_pj_per_conversion: 0.45
execution:
  batch_size: 16
  vector_reuse_factor: 1
  weight_reuse_factor: 1
  weight_stationary: true
  pipeline:
    stages: 4
    cycle_time_ns: 2
timing:
  optical_latency_ns: 3
  adc_latency_ns: 1
  dac_latency_ns: 1
noise:
  phase_noise_rad_rms: 0.02
  drift_rad_per_second: 0.1
  integration_time_ns: 3
