benchmark:
  name: Ning 2025 CirPTC structured tensor core surrogate
  description: Source-backed card for the Optica 2025 block-circulant photonic tensor core. The paper reports structured-compression and projected efficiency metrics; this config uses a 16x16 dense local tile as a conservative comparison surrogate only.
workload:
  type: matmul
  m: 16
  n: 16
  k: 16
device:
  optical_mac_energy_fj: 0.5
  laser_wall_plug_efficiency: 0.25
  photodetector_energy_fj_per_sample: 10
  adc:
    bits: 8
    energy_pj_per_conversion: 0.5
  vector_dac:
    bits: 8
    energy_pj_per_conversion: 0.2
  weight_dac:
    bits: 8
    energy_pj_per_conversion: 0.2
execution:
  batch_size: 1
  vector_reuse_factor: 1
  weight_reuse_factor: 1
  weight_stationary: true
  pipeline:
    stages: 1
timing:
  optical_latency_ns: 1
  adc_latency_ns: 0
  dac_latency_ns: 0
noise:
  phase_noise_rad_rms: 0.02
  drift_rad_per_second: 0.1
  integration_time_ns: 1
provenance:
  source_title: "Hardware-efficient photonic tensor core: accelerating deep neural networks with structured compression"
  source_url: https://opg.optica.org/optica/abstract.cfm?uri=optica-12-7-1079
  doi: 10.1364/OPTICA.559604
  venue: Optica 12, 1079-1089 (2025)
  claim_status: paper-reported structured-compression and projected efficiency metrics; matmul-surrogate local model
published_calibration:
  architecture: Block-circulant photonic tensor core for structure-compressed optical neural networks
  additional_metrics:
    projected_power_efficiency_tops_per_watt: 47.94
    computational_density_tops_per_mm2: 5.84
    trainable_parameter_reduction_percent: 74.91
    hardware_software_codesign_improvement_x: 6.87
    structure: block-circulant
    surrogate_mapping: m=16, k=16, n=16 is a dense local tile for a structured-compressed tensor core; it does not encode the block-circulant training or compression schedule.
source_quality:
  reported_metrics:
    - projected_power_efficiency
    - computing_density
    - parameter_reduction
    - architecture
  local_surrogate_type: dense_block_circulant_tensor_core_surrogate
  coverage:
    throughput: derived
    energy: derived
    accuracy: reported
    area: derived
    precision: not_reported
  confidence_grade: C
  notes:
    - Efficiency and density are performance-analysis projections, so this card keeps them as additional metrics rather than converting them into measured published energy.
assumptions:
  - Source-reported projected efficiency, density, and compression metrics are preserved as paper references.
  - The dense local tile is intentionally conservative and does not model block-circulant parameter sharing or hardware-aware training.
  - Local timing, converter energy, system tiers, and noise settings are generic PhotonicBench assumptions.
