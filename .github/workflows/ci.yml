name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Ruff, package, and pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run Ruff
        run: python -m ruff check

      - name: Build package
        run: python -m build

      - name: Run pytest
        env:
          VISUAL_REGRESSION_BASELINE_PLATFORM: github-linux
          VISUAL_REGRESSION_OUTPUT_DIR: test-results/visual-regression
        run: python -m pytest

      - name: Upload visual regression screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: visual-regression-screenshots
          path: test-results/visual-regression/*.png
          if-no-files-found: ignore

      - name: Verify generated artifacts are fresh
        run: python -m photonic_bench.cli verify-artifacts

  macos-visual-baselines:
    name: macOS visual regression
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Run macOS visual regression
        env:
          VISUAL_REGRESSION_BASELINE_PLATFORM: macos
          VISUAL_REGRESSION_OUTPUT_DIR: test-results/visual-regression-macos
        run: python -m pytest tests/test_visualizer_visual_regression.py -q

      - name: Upload macOS visual regression screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: macos-visual-regression-screenshots
          path: |
            test-results/visual-regression-macos/*.png
            tests/visual_baselines/macos/*.png
          if-no-files-found: ignore
