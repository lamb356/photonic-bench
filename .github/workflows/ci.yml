name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Ruff, package, and pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run Ruff
        run: python -m ruff check

      - name: Build package
        run: python -m build

      - name: Run pytest
        env:
          VISUAL_REGRESSION_BASELINE_PLATFORM: github-linux
          VISUAL_REGRESSION_OUTPUT_DIR: test-results/visual-regression
        run: python -m pytest

      - name: Upload visual regression screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-screenshots
          path: test-results/visual-regression/*.png
          if-no-files-found: ignore

      - name: Verify generated artifacts are fresh
        run: python -m photonic_bench.cli verify-artifacts
