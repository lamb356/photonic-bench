<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PhotonicBench Visualizer</title>
  <link rel="stylesheet" href="{{ stylesheet_path }}">
</head>
<body>
  <div class="app-shell">
    <aside class="rail" aria-label="Artifact navigation">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>PhotonicBench Visualizer</h1>
          <div class="subtitle">Schema-aware JSON workbench</div>
        </div>
      </div>

      <div class="counts" aria-label="Artifact counts">
        <div class="count-box">
          <strong id="artifact-count">{{ artifact_count }}</strong>
          <span>loaded artifacts</span>
        </div>
        <div class="count-box">
          <strong id="issue-count">{{ issue_count }}</strong>
          <span>index warnings</span>
        </div>
      </div>

      <div class="mode-tabs" aria-label="View mode">
        <button id="detail-mode" class="mode-tab active" type="button">Detail</button>
        <button id="compare-mode" class="mode-tab" type="button">Compare <span id="compare-count">0</span></button>
      </div>

      <div class="preset-panel" aria-label="Comparison presets">
        <select id="preset-select" aria-label="Saved comparison presets">
          <option value="">Comparison presets</option>
        </select>
        <div class="preset-actions">
          <button id="load-preset" class="action-button" type="button">Load</button>
          <button id="delete-preset" class="action-button" type="button">Delete</button>
        </div>
        <div class="save-preset-row">
          <input id="preset-name" type="text" placeholder="Preset name" aria-label="Preset name">
          <button id="save-preset" class="action-button primary" type="button">Save</button>
        </div>
        <div class="preset-actions">
          <button id="export-presets" class="action-button" type="button">Export local</button>
          <label class="action-button import-preset-button" for="import-preset-file">
            Import local
            <input id="import-preset-file" type="file" accept="application/json,.json" aria-label="Import browser-local presets">
          </label>
        </div>
        <div id="preset-message" class="preset-message" aria-live="polite"></div>
      </div>

      <div class="external-panel" aria-label="External reports">
        <label class="file-picker">
          <span>Load external JSON reports</span>
          <input id="external-report-file" type="file" accept="application/json,.json" multiple aria-label="Load external JSON reports">
        </label>
        <button id="clear-external" class="action-button" type="button">Clear external</button>
        <div id="external-message" class="preset-message" aria-live="polite"></div>
        <div id="external-diagnostics" class="external-diagnostics" aria-live="polite"></div>
      </div>

      <div class="decision-packet-panel" aria-label="Decision packet replay">
        <label id="decision-packet-drop-zone" class="file-picker decision-packet-drop-zone">
          <span>Replay decision packet</span>
          <input id="decision-packet-file" type="file" accept="application/json,.json" aria-label="Replay decision packet">
        </label>
        <div id="decision-packet-message" class="preset-message" aria-live="polite"></div>
      </div>

      <div class="filters">
        <input id="search" type="search" placeholder="Filter artifacts" aria-label="Filter artifacts">
        <select id="kind-filter" aria-label="Filter by artifact kind">
          <option value="all">All schemas</option>
          <option value="transformer_model">Transformer models</option>
          <option value="transformer_layer">Transformer layers</option>
          <option value="matmul_card">Per-matmul cards</option>
        </select>
        <select id="boundary-filter" aria-label="Filter by modeling boundary">
          <option value="all">All boundary states</option>
          <option value="published">Has published reference</option>
          <option value="local-only">Local model only</option>
          <option value="provenance">Has provenance</option>
          <option value="transformer-boundaries">Serial/noise/exclusion boundaries</option>
        </select>
        <select id="quality-filter" aria-label="Filter by source quality">
          <option value="all">All source grades</option>
          <option value="A">Source grade A</option>
          <option value="B">Source grade B</option>
          <option value="C">Source grade C</option>
          <option value="D">Source grade D</option>
          <option value="unrated">Unrated source quality</option>
        </select>
        <select id="sort-filter" aria-label="Sort artifacts">
          <option value="name">Sort by name</option>
          <option value="energy">Sort by local energy</option>
          <option value="intensity">Sort by ops per byte</option>
          <option value="latency">Sort by latency</option>
          <option value="ops">Sort by equivalent ops</option>
        </select>
        <select id="group-filter" aria-label="Group artifact list">
          <option value="schema">Group by schema</option>
          <option value="source-quality">Group by source grade</option>
          <option value="system-profile">Group by system profile</option>
          <option value="boundary">Group by boundary tag</option>
          <option value="none">Ungrouped list</option>
        </select>
        <div class="filter-actions">
          <button id="compare-visible" class="action-button primary" type="button">Compare visible</button>
          <button id="clear-filters" class="action-button" type="button">Reset filters</button>
        </div>
      </div>

      <div id="artifact-list" class="artifact-list" aria-live="polite"></div>
      <div id="issues" class="issue-list"></div>
    </aside>

    <main>
      <div id="detail" class="detail" aria-live="polite">
        <div class="empty">Loading artifact index...</div>
      </div>
    </main>
  </div>

  <script src="{{ index_script_path }}"></script>
  <script src="{{ app_script_path }}" defer></script>
</body>
</html>
